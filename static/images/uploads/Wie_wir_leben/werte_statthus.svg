<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 695" font-family="Open Sans, Segoe UI, Helvetica Neue, Arial, sans-serif" role="img" aria-label="Unsere Werte: Gemeinschaft, Respekt und Toleranz, Sich gegenseitig helfen, Gesellschaftliches Engagement, Gutes Leben">
<rect width="960" height="695" fill="#faf6f0"/>
<g>
<rect x="12" y="12" width="428" height="335.0" rx="20" fill="#F7DFC5" stroke="#E0B183" stroke-opacity="0.55"/>
<text x="36" y="58" font-size="25" font-weight="700" fill="#8F4A0E">Gemeinschaft</text>
<rect x="36.0" y="78.0" width="186.4" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#E0B183" stroke-opacity="0.45"/>
<text x="49.0" y="97.8" font-size="14.0" fill="#2c2c2c">gemeinsam ist man stark</text>
<rect x="232.4" y="78.0" width="180.6" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#E0B183" stroke-opacity="0.45"/>
<text x="245.4" y="97.8" font-size="14.0" fill="#2c2c2c">gemeinsam statt einsam</text>
<rect x="36.0" y="119.0" width="215.6" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#E0B183" stroke-opacity="0.45"/>
<text x="49.0" y="138.8" font-size="14.0" fill="#2c2c2c">in Frieden miteinander leben</text>
<rect x="36.0" y="160.0" width="194.0" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#E0B183" stroke-opacity="0.45"/>
<text x="49.0" y="179.8" font-size="14.0" fill="#2c2c2c">Lust auf Menschen haben</text>
<rect x="36.0" y="201.0" width="229.8" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#E0B183" stroke-opacity="0.45"/>
<text x="49.0" y="220.8" font-size="14.0" fill="#2c2c2c">Alt und Jung unter einem Dach</text>
<rect x="36.0" y="242.0" width="201.8" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#E0B183" stroke-opacity="0.45"/>
<text x="49.0" y="261.8" font-size="14.0" fill="#2c2c2c">Konflikte gemeinsam lösen</text>
<rect x="36.0" y="283.0" width="313.0" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#E0B183" stroke-opacity="0.45"/>
<text x="49.0" y="302.8" font-size="14.0" fill="#2c2c2c">gemeinsame Ziele haben und verwirklichen</text>
</g>
<g>
<rect x="12" y="359.0" width="428" height="312.0" rx="20" fill="#F2DBD8" stroke="#DBAAA3" stroke-opacity="0.55"/>
<text x="36" y="405.0" font-size="25" font-weight="700" fill="#A8131A">Respekt und Toleranz</text>
<rect x="36.0" y="425.0" width="276.3" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#DBAAA3" stroke-opacity="0.45"/>
<text x="49.0" y="444.8" font-size="14.0" fill="#2c2c2c">miteinander reden, nicht übereinander</text>
<rect x="36.0" y="466.0" width="268.8" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#DBAAA3" stroke-opacity="0.45"/>
<text x="49.0" y="485.8" font-size="14.0" fill="#2c2c2c">Vorurteile und verurteilen vermeiden</text>
<rect x="36.0" y="507.0" width="225.9" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#DBAAA3" stroke-opacity="0.45"/>
<text x="49.0" y="526.8" font-size="14.0" fill="#2c2c2c">Achtsamkeit &amp; Selbstreflektion</text>
<rect x="36.0" y="548.0" width="172.7" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#DBAAA3" stroke-opacity="0.45"/>
<text x="49.0" y="567.8" font-size="14.0" fill="#2c2c2c">leben und leben lassen</text>
<rect x="218.7" y="548.0" width="78.9" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#DBAAA3" stroke-opacity="0.45"/>
<text x="231.7" y="567.8" font-size="14.0" fill="#2c2c2c">zuhören</text>
<rect x="36.0" y="589.0" width="366.8" height="48" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#DBAAA3" stroke-opacity="0.45"/>
<text x="49.0" y="608.0" font-size="14.0" fill="#2c2c2c">respektvoller und fairer Umgang miteinander,</text>
<text x="49.0" y="626.0" font-size="14.0" fill="#2c2c2c">innerhalb und auch außerhalb unserer Gemeinschaft</text>
</g>
<g>
<rect x="452" y="12" width="496" height="284.0" rx="20" fill="#D9E7E8" stroke="#9FC3C7" stroke-opacity="0.55"/>
<text x="476" y="58" font-size="25" font-weight="700" fill="#056478">Sich gegenseitig helfen</text>
<rect x="476.0" y="78.0" width="150.3" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#9FC3C7" stroke-opacity="0.45"/>
<text x="489.0" y="97.8" font-size="14.0" fill="#2c2c2c">teilen statt besitzen</text>
<rect x="476.0" y="119.0" width="288.1" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#9FC3C7" stroke-opacity="0.45"/>
<text x="489.0" y="138.8" font-size="14.0" fill="#2c2c2c">sich nach seinen Fähigkeiten einbringen</text>
<rect x="774.1" y="119.0" width="117.3" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#9FC3C7" stroke-opacity="0.45"/>
<text x="787.1" y="138.8" font-size="14.0" fill="#2c2c2c">zuständig sein</text>
<rect x="476.0" y="160.0" width="134.6" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#9FC3C7" stroke-opacity="0.45"/>
<text x="489.0" y="179.8" font-size="14.0" fill="#2c2c2c">Kinderbetreuung</text>
<rect x="620.6" y="160.0" width="192.0" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#9FC3C7" stroke-opacity="0.45"/>
<text x="633.6" y="179.8" font-size="14.0" fill="#2c2c2c">sich auf andere verlassen</text>
<rect x="476.0" y="201.0" width="197.1" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#9FC3C7" stroke-opacity="0.45"/>
<text x="489.0" y="220.8" font-size="14.0" fill="#2c2c2c">Lasten und Freuden teilen</text>
<rect x="476.0" y="242.0" width="366.5" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#9FC3C7" stroke-opacity="0.45"/>
<text x="489.0" y="261.8" font-size="14.0" fill="#2c2c2c">an den Erfahrungen anderer Generationen teilhaben</text>
</g>
<g>
<rect x="452" y="308.0" width="496" height="202.0" rx="20" fill="#E5E7D0" stroke="#BEC48E" stroke-opacity="0.55"/>
<text x="476" y="354.0" font-size="25" font-weight="700" fill="#55622A">Gesellschaftliches Engagement</text>
<rect x="476.0" y="374.0" width="149.2" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#BEC48E" stroke-opacity="0.45"/>
<text x="489.0" y="393.8" font-size="14.0" fill="#2c2c2c">Vorbild für Andere</text>
<rect x="635.2" y="374.0" width="187.0" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#BEC48E" stroke-opacity="0.45"/>
<text x="648.2" y="393.8" font-size="14.0" fill="#2c2c2c">Nachhaltigkeit / Umwelt</text>
<rect x="476.0" y="415.0" width="145.8" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#BEC48E" stroke-opacity="0.45"/>
<text x="489.0" y="434.8" font-size="14.0" fill="#2c2c2c">politisches Projekt</text>
<rect x="476.0" y="456.0" width="389.4" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#BEC48E" stroke-opacity="0.45"/>
<text x="489.0" y="475.8" font-size="14.0" fill="#2c2c2c">gemeinsam ein (altes) Haus erhalten und bewirtschaften</text>
</g>
<g>
<rect x="452" y="522.0" width="496" height="161.0" rx="20" fill="#E7DAE3" stroke="#C4A7BB" stroke-opacity="0.55"/>
<text x="476" y="568.0" font-size="25" font-weight="700" fill="#6B4562">Gutes Leben</text>
<rect x="476.0" y="588.0" width="115.3" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#C4A7BB" stroke-opacity="0.45"/>
<text x="489.0" y="607.8" font-size="14.0" fill="#2c2c2c">zu Hause sein</text>
<rect x="601.3" y="588.0" width="169.6" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#C4A7BB" stroke-opacity="0.45"/>
<text x="614.3" y="607.8" font-size="14.0" fill="#2c2c2c">Aktivität und Rückzug</text>
<rect x="476.0" y="629.0" width="319.2" height="30" rx="15" fill="#ffffff" fill-opacity="0.78" stroke="#C4A7BB" stroke-opacity="0.45"/>
<text x="489.0" y="648.8" font-size="14.0" fill="#2c2c2c">im Fluss und Wandel leben, nicht versteinern</text>
</g>
</svg>