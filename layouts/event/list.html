{{ define "main" }}
  <section class="section-sm">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <div class="title-bordered mb-5 d-flex align-items-center">
            <h1 class="h2">{{ .Title }}</h1>
          </div>
          {{ with .Content }}
            <div class="content">{{ . }}</div>
          {{ end }}
        </div>
      </div>
    </div>
  </section>
{{ end }}
