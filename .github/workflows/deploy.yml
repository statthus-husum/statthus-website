# GitHub Actions workflow for deploying Hugo site to GitHub Pages
#
# Prerequisites:
# 1. Go to repository Settings > Pages
# 2. Set "Source" to "GitHub Actions"
# 3. (Optional) Configure custom domain in Settings > Pages
#
# The workflow triggers on:
# - Push to main branch
# - Manual dispatch via GitHub UI

name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.162.1"
      GO_VERSION: "1.20"
      NODE_VERSION: "22"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Hugo modules
        # No -u: stick to the versions pinned in go.mod / go.sum
        run: hugo mod get

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Berlin
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # FTP deploy job — runs in PARALLEL with the Pages build/deploy (no `needs`).
  # Builds Hugo with the FTP site's own base URL and uploads ./public via FTPS.
  # Configure in repo Settings:
  #   Variables: FTP_DEPLOY=true (enables this job), FTP_BASE_URL=https://your-ftp-domain
  #              optional FTP_SERVER_DIR (remote target dir, must end with /, default ./)
  #   Secrets:   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
  #              (kept out of this public repo's git history on purpose)
  deploy-ftp:
    if: ${{ vars.FTP_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.162.1"
      GO_VERSION: "1.20"
      NODE_VERSION: "22"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Install Hugo modules
        # No -u: stick to the versions pinned in go.mod / go.sum
        run: hugo mod get

      - name: Build with Hugo (FTP base URL)
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Berlin
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ vars.FTP_BASE_URL || '/' }}"

      - name: Deploy to FTP (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./public/
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
